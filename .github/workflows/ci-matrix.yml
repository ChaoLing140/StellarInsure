name: CI Matrix

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-matrix:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      PYTHONPATH: backend
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Alembic migrations apply cleanly
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:///ci_test.db
          JWT_SECRET_KEY: ci-test-secret
        run: alembic upgrade head

      - name: Run backend tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite://
          JWT_SECRET_KEY: ci-test-secret
        run: pytest

  frontend-matrix:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run type-check

  contracts-matrix:
    name: Contracts (Rust ${{ matrix.rust-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust-version: ["stable", "1.81.0", "1.82.0"]
    defaults:
      run:
        working-directory: smartcontract
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust ${{ matrix.rust-version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust-version }}
          targets: wasm32-unknown-unknown

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run contract tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Run contract fuzz tests
        run: cargo test fuzz_ -- --nocapture

      - name: Build Wasm contract
        run: cargo build --target wasm32-unknown-unknown --release
